name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # Compile everything (including the integration test target) on every OS.
      - name: Build
        run: cargo build --locked --all-targets

      # Unit tests are platform-agnostic and run everywhere. This is a
      # binary-only crate, so the unit tests live in the `gh-qwt` bin target.
      - name: Unit tests
        run: cargo test --locked --bin gh-qwt

      # The integration tests and smoke test drive the CLI against local
      # `file://` repositories, which assume POSIX path semantics, so they run
      # on Unix only.
      - name: Integration tests
        if: runner.os != 'Windows'
        run: cargo test --locked --test cli

      - name: Smoke test
        if: runner.os != 'Windows'
        run: script/smoke-test.sh
